name: publish

# GPU server is temporary/rented, so we can't build on CI.
# Instead: build the wheel on the GPU server, attach it to a GitHub Release,
# and this workflow publishes it to PyPI via trusted publishing.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheel from release
        run: |
          gh release download ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            --pattern "*.whl" \
            --dir dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
    env:
      GH_TOKEN: ${{ github.token }}
